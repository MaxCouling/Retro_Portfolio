title: Max Couling
email: max@maxcouling.com
description: >-
  Cybersecurity consultant by day, plush-game developer by night.
  Projects, hardware build logs, book & game reviews — and a playable arcade.
baseurl: ""
url: "https://maxcouling.com"
# (no timezone setting: post dates carry explicit +12/+13 offsets from new_post.py,
#  and tzinfo is a pain on Windows)

collections:
  software:
    output: true
    permalink: /software/:name/
  hardware:
    output: true
    permalink: /hardware/:name/

markdown: kramdown
theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

sass:
  style: compressed

exclude:
  - tools/
  - new_post.py
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
