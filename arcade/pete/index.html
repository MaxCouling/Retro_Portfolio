<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pete's Rescue Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html,body{margin:0;padding:0;background:#0e0e16;height:100%;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000}
  #err{position:fixed;left:8px;bottom:8px;color:#ff8080;font:12px monospace;white-space:pre;z-index:9;pointer-events:none}
</style>
</head>
<body>
<canvas id="game" width="320" height="180"></canvas>
<div id="err"></div>
<script>
window.onerror = function (m, s, l) {
  document.getElementById('err').textContent += m + ' @ ' + (s || '').split('/').pop() + ':' + l + '\n';
};
</script>
<script src="js/palette.js"></script>
<script src="js/text.js"></script>
<script src="js/sprites.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/particles.js"></script>
<script src="js/physics.js"></script>
<script src="js/camera.js"></script>
<script src="js/dialogue.js"></script>
<script src="js/levels.js"></script>
<script src="js/entities.js"></script>
<script src="js/scenes.js"></script>
<script src="js/main.js"></script>
</body>
</html>
